<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; }
  .container { display: flex; justify-content: center; overflow-x: auto; padding: 8px; min-height: 60px; }
  .container svg { max-width: 100%; height: auto; }
  .loading { display: flex; align-items: center; justify-content: center; padding: 32px; }
  .spinner { width: 20px; height: 20px; border: 2px solid #ccc; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { padding: 16px; border-radius: 8px; font-size: 13px; }
  .error p { font-weight: 600; margin-bottom: 8px; }
  .error pre { white-space: pre-wrap; font-size: 12px; opacity: 0.7; font-family: monospace; }
  /* Hidden container for mermaid to render into — must have real dimensions */
  #mermaid-render { position: absolute; left: -9999px; top: 0; width: 800px; }
</style>

<div id="root">
  <div class="loading"><div class="spinner"></div></div>
</div>
<div id="mermaid-render"></div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  var plugin = eduskript.init();
  var definition = '';
  var currentTheme = 'light';

  function renderDiagram() {
    if (!definition) {
      document.getElementById('root').innerHTML = '<div class="loading" style="color:#999">No diagram definition provided</div>';
      return;
    }

    var root = document.getElementById('root');
    root.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    mermaid.initialize({
      startOnLoad: false,
      theme: currentTheme === 'dark' ? 'dark' : 'default',
      securityLevel: 'loose',
      fontFamily: 'system-ui, -apple-system, sans-serif',
      fontSize: 14
    });

    var id = 'mermaid-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);

    // Render into the offscreen container (needs real dimensions for edge routing)
    mermaid.render(id, definition, document.getElementById('mermaid-render')).then(function(result) {
      root.innerHTML = '<div class="container">' + result.svg + '</div>';
    }).catch(function(err) {
      console.error('Mermaid render error:', err);
      var errMsg = (err && err.message) ? err.message : String(err);
      var isDark = currentTheme === 'dark';
      root.innerHTML = '<div class="error" style="border:1px solid ' + (isDark ? '#7f1d1d' : '#fecaca') + ';background:' + (isDark ? '#1c0a0a' : '#fef2f2') + ';color:' + (isDark ? '#fca5a5' : '#dc2626') + '">' +
        '<p>Mermaid diagram error</p>' +
        '<pre>' + errMsg.replace(/</g, '&lt;') + '</pre>' +
        '</div>';
    });
  }

  function decodeEntities(str) {
    var el = document.createElement('textarea');
    el.innerHTML = str;
    return el.value;
  }

  function applyTheme(theme) {
    currentTheme = theme;
    document.body.style.background = 'transparent';
    renderDiagram();
  }

  plugin.onReady(function(ctx) {
    var raw = (ctx.config && (ctx.config.content || ctx.config.definition)) || '';
    definition = decodeEntities(raw.trim());
    applyTheme(ctx.theme);
  });
  plugin.onThemeChange(function(theme) { applyTheme(theme); });
</script>
