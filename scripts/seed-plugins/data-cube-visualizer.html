<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .dcv { display: flex; flex-direction: column; gap: 16px; padding: 16px; border-radius: 8px; font-family: system-ui, sans-serif; transition: background 0.2s, color 0.2s; }
  .dcv-sliders { display: flex; flex-direction: column; gap: 12px; }
  .dcv-slider { display: flex; align-items: center; gap: 12px; }
  .dcv-slider label { font-size: 14px; font-weight: 500; min-width: 100px; }
  .dcv-slider label span { font-family: monospace; }
  .dcv-slider input[type=range] { flex: 1; accent-color: #3b82f6; cursor: pointer; }
  .dcv-panels { display: flex; flex-wrap: wrap; gap: 16px; align-items: start; justify-content: center; }
  .dcv-panel { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .dcv-panel-frame { width: 216px; height: 144px; border: 2px solid; border-radius: 4px; overflow: hidden; }
  .dcv-panel-frame img, .dcv-panel-frame canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  .dcv-panel-label { font-size: 13px; }
  .dcv-cube-frame { border: 2px solid; border-radius: 4px; }
  .dcv-cube-frame canvas { display: block; }
</style>

<div class="dcv" id="dcv">
  <div class="dcv-sliders">
    <div class="dcv-slider">
      <label>Breite: <span id="w-val">18</span> Pixel</label>
      <input type="range" id="w-slider" min="1" max="64" value="18">
    </div>
    <div class="dcv-slider">
      <label>Höhe: <span id="h-val">12</span> Pixel</label>
      <input type="range" id="h-slider" min="1" max="64" value="12">
    </div>
    <div class="dcv-slider">
      <label>Farbtiefe: <span id="d-val">2</span> Bit pro Farbkanal</label>
      <input type="range" id="d-slider" min="1" max="8" value="2">
    </div>
  </div>
  <div class="dcv-panels">
    <div class="dcv-panel">
      <div class="dcv-panel-frame"><img id="original-img" alt="Original"></div>
      <div class="dcv-panel-label">Original</div>
    </div>
    <div class="dcv-panel">
      <div class="dcv-panel-frame"><canvas id="quantized-canvas" width="216" height="144"></canvas></div>
      <div class="dcv-panel-label" id="quantized-label">Quantisiert</div>
    </div>
    <div class="dcv-panel">
      <div class="dcv-cube-frame" id="cube-container"></div>
      <div class="dcv-panel-label">Daten-Würfel (3D)</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

var plugin = eduskript.init();
var scene, camera, renderer, controls, animFrameId;
var cubeContainer = document.getElementById('cube-container');
var originalImg = document.getElementById('original-img');

var imgWidth = 18, imgHeight = 12, colorDepth = 2;
var loadedImage = null;

// --- Image processing (matches original exactly) ---
function quantizeColor(value, bits) {
  if (bits >= 8) return value;
  var levels = Math.pow(2, bits);
  var step = 255 / (levels - 1);
  return Math.round(Math.round(value / step) * step);
}

function quantizeImageDataInPlace(data, bits) {
  if (bits >= 8) return;
  for (var i = 0; i < data.length; i += 4) {
    data[i]     = quantizeColor(data[i], bits);
    data[i + 1] = quantizeColor(data[i + 1], bits);
    data[i + 2] = quantizeColor(data[i + 2], bits);
  }
}

// --- Load demo image ---
function loadDemoImage() {
  var img = new Image();
  img.onload = function() {
    loadedImage = img;
    originalImg.src = img.src;
    update();
  };
  img.onerror = function() {
    // Fallback test pattern
    var c = document.createElement('canvas');
    c.width = 64; c.height = 64;
    var ctx = c.getContext('2d');
    for (var y = 0; y < 64; y++) {
      for (var x = 0; x < 64; x++) {
        ctx.fillStyle = 'rgb(' + (x*4) + ',' + (y*4) + ',' + ((x+y)*2) + ')';
        ctx.fillRect(x, y, 1, 1);
      }
    }
    var fallback = new Image();
    fallback.onload = function() { loadedImage = fallback; originalImg.src = fallback.src; update(); };
    fallback.src = c.toDataURL();
  };
  img.src = DEFAULT_IMAGE;
}

// --- Update 2D quantized preview ---
function updateQuantizedPreview() {
  if (!loadedImage) return;
  var offscreen = document.createElement('canvas');
  offscreen.width = imgWidth;
  offscreen.height = imgHeight;
  var offCtx = offscreen.getContext('2d', { willReadFrequently: true });
  offCtx.imageSmoothingEnabled = false;
  offCtx.drawImage(loadedImage, 0, 0, imgWidth, imgHeight);

  if (colorDepth < 8) {
    var imgData = offCtx.getImageData(0, 0, imgWidth, imgHeight);
    quantizeImageDataInPlace(imgData.data, colorDepth);
    offCtx.putImageData(imgData, 0, 0);
  }

  var ctx = quantizedCanvas.getContext('2d');
  ctx.clearRect(0, 0, 216, 144);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offscreen, 0, 0, imgWidth, imgHeight, 0, 0, 216, 144);

  var totalColors = Math.pow(Math.pow(2, colorDepth), 3);
  quantizedLabel.textContent = 'Quantisiert (' + imgWidth + '×' + imgHeight + ', ' + colorDepth + ' Bit, ' + totalColors + ' Farben)';
}

// --- Three.js scene ---
function initThree() {
  var size = 400;
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x171717);

  camera = new THREE.PerspectiveCamera(35, 1, 1, 100);
  camera.position.set(-15, 15, -15);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(size, size);
  renderer.setPixelRatio(window.devicePixelRatio);
  cubeContainer.appendChild(renderer.domElement);

  var dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(1, 1, 1).normalize();
  scene.add(dirLight);
  scene.add(new THREE.AmbientLight(0x404040));

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  function animate() {
    animFrameId = requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}

// --- Build 3D cube (matches original: width × height × colorDepth*3) ---
function buildCube() {
  // Remove existing meshes and edges (keep lights)
  var toRemove = scene.children.filter(function(c) {
    return c instanceof THREE.Mesh || c.type === 'LineSegments';
  });
  toRemove.forEach(function(obj) {
    if (obj instanceof THREE.Mesh) {
      obj.geometry.dispose();
      if (obj.material instanceof THREE.Material) obj.material.dispose();
    }
    scene.remove(obj);
  });

  var cubeSize = 0.5;
  var cubeDistance = cubeSize + 0.1;
  var geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);

  // Color channel materials (matching original: MeshPhongMaterial)
  var redMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
  var greenMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
  var blueMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff });
  var edgesMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 0.5 });

  // Center offsets
  var offsetX = (imgWidth * cubeDistance) / 2;
  var offsetY = (colorDepth * 3 * cubeDistance) / 2;
  var offsetZ = (imgHeight * cubeDistance) / 2;

  for (var x = 0; x < imgWidth; x++) {
    for (var y = 0; y < colorDepth * 3; y++) {
      for (var z = 0; z < imgHeight; z++) {
        var material;
        if (y < colorDepth) {
          material = blueMaterial;
        } else if (y < colorDepth * 2) {
          material = greenMaterial;
        } else {
          material = redMaterial;
        }

        var cube = new THREE.Mesh(geometry, material);
        cube.position.set(
          x * cubeDistance - offsetX,
          y * cubeDistance - offsetY,
          z * cubeDistance - offsetZ
        );
        scene.add(cube);

        var edgesGeo = new THREE.EdgesGeometry(cube.geometry);
        var edges = new THREE.LineSegments(edgesGeo, edgesMaterial);
        edges.position.copy(cube.position);
        scene.add(edges);
      }
    }
  }

  // Add quantized image on top of cuboid
  if (loadedImage) {
    var offscreen = document.createElement('canvas');
    offscreen.width = imgWidth;
    offscreen.height = imgHeight;
    var offCtx = offscreen.getContext('2d', { willReadFrequently: true });
    offCtx.imageSmoothingEnabled = false;
    offCtx.drawImage(loadedImage, 0, 0, imgWidth, imgHeight);

    if (colorDepth < 8) {
      var imgData = offCtx.getImageData(0, 0, imgWidth, imgHeight);
      quantizeImageDataInPlace(imgData.data, colorDepth);
      offCtx.putImageData(imgData, 0, 0);
    }

    var texture = new THREE.CanvasTexture(offscreen);
    texture.magFilter = THREE.NearestFilter;
    texture.minFilter = THREE.NearestFilter;
    texture.colorSpace = THREE.SRGBColorSpace;
    texture.flipY = false;

    var planeWidth = (imgWidth - 1) * cubeDistance + cubeSize;
    var planeHeight = (imgHeight - 1) * cubeDistance + cubeSize;
    var planeGeo = new THREE.PlaneGeometry(planeWidth, planeHeight);
    var planeMat = new THREE.MeshBasicMaterial({
      map: texture,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.8
    });
    var plane = new THREE.Mesh(planeGeo, planeMat);

    var topY = (colorDepth * 3 - 1) * cubeDistance - offsetY + cubeSize / 2 + 0.05;
    var centerX = ((imgWidth - 1) * cubeDistance) / 2 - offsetX;
    var centerZ = ((imgHeight - 1) * cubeDistance) / 2 - offsetZ;
    plane.position.set(centerX, topY, centerZ);
    plane.rotation.x = -Math.PI / 2;
    plane.scale.x = -1;

    scene.add(plane);
  }
}

function update() {
  buildCube();
  updateQuantizedPreview();
}

// --- Slider events ---
wSlider.addEventListener('input', function() {
  imgWidth = parseInt(this.value);
  wVal.textContent = imgWidth;
  update();
});
hSlider.addEventListener('input', function() {
  imgHeight = parseInt(this.value);
  hVal.textContent = imgHeight;
  update();
});
dSlider.addEventListener('input', function() {
  colorDepth = parseInt(this.value);
  dVal.textContent = colorDepth;
  update();
});

// --- Init ---
initThree();
loadDemoImage();

function applyTheme(theme) {
  var isDark = theme === 'dark';
  var root = document.getElementById('dcv');
  root.style.background = isDark ? '#171717' : '#f5f5f5';
  root.style.color = isDark ? '#fff' : '#1a1a1a';

  var frames = document.querySelectorAll('.dcv-panel-frame, .dcv-cube-frame');
  for (var i = 0; i < frames.length; i++) {
    frames[i].style.borderColor = isDark ? '#525252' : '#d4d4d4';
  }

  var labels = document.querySelectorAll('.dcv-panel-label');
  for (var j = 0; j < labels.length; j++) {
    labels[j].style.color = isDark ? '#a3a3a3' : '#737373';
  }

  if (scene) {
    scene.background = new THREE.Color(isDark ? 0x171717 : 0xfafafa);
  }
}

applyTheme('dark');

plugin.onReady(function(ctx) {
  applyTheme(ctx.theme || 'dark');
});
plugin.onThemeChange(function(theme) {
  applyTheme(theme);
});
</script>
